version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: price_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: price_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

name: Deploy Price Tracker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    env:
      PG_USER: ${{ secrets.PG_USER }}
      PG_PASS: ${{ secrets.PG_PASS }}
      PG_DB: ${{ secrets.PG_DB }}
      GITHUB_MODELS_TOKEN: ${{ secrets._GITHUB_MODELS_TOKEN }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      FIRECRAWL_API_URL: ${{ secrets.FIRECRAWL_API_URL }}
      API_URL: ${{ secrets.API_URL }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker Resources
        run: |
          docker network inspect price-tracker >/dev/null 2>&1 || docker network create price-tracker
          docker volume inspect price-tracker-database >/dev/null 2>&1 || docker volume create price-tracker-database
          docker volume inspect snote-dbx >/dev/null 2>&1 || docker volume create snote-dbx

      - name: Clean Containers And Images
        run: docker compose -f compose.yaml -p price-tracker down --rmi all --remove-orphans

      - name: Deploy Application
        run: docker compose -f compose.yaml -p price-tracker up -d --build
